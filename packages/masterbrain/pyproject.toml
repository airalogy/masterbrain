[project]
name = "masterbrain"
version = "0.8.0"
authors = [{ name = "Airalogy MasterBrain Team" }]
description = "Airalogy MasterBrain"
readme = "README.md"
license = { text = "Apache License 2.0" }
requires-python = ">=3.13"
classifiers = ["Programming Language :: Python :: 3"]
dependencies = [
    "airalogy>=0.10.0,<1",
    "python-dotenv>=1.0.1,<2",
    "langchain>=0.2.7,<1",
    "langchain-openai<1",
    "fastapi>=0.112.2,<1",
    "pydantic>=2.8.2,<3",
    "uvicorn>=0.30.0,<1",
    "openai>=1.102.0",
    "dashscope>=1.25.2",
    "tavily>=1.1.0",
    "httpx>=0.27.0",
    "socksio>=1.0.0,<2",
    "langchain-core>=0.2.0,<1",
    "litellm>=1.82.0,!=1.82.7,!=1.82.8,<2",
]

[project.scripts]
masterbrain-studio = "masterbrain.desktop:main"
masterbrain-desktop = "masterbrain.desktop:main"
masterbrain-build-desktop = "masterbrain.build_desktop_bundle:main"


[project.optional-dependencies]
api = [
    "fastapi>=0.112.2,<1",
    "httpx>=0.27.0",
    "socksio>=1.0.0,<2",
    "uvicorn>=0.30.0,<1",
]
openai = ["openai>=1.102.0"]
qwen = ["dashscope>=1.25.2"]
litellm = ["litellm>=1.82.0,!=1.82.7,!=1.82.8,<2"]
all-providers = [
    "openai>=1.102.0",
    "dashscope>=1.25.2",
    "litellm>=1.82.0,!=1.82.7,!=1.82.8,<2",
]


[build-system]
requires = ["uv_build>=0.8.8,<0.9.0"]
build-backend = "uv_build"

[[tool.uv.index]]
url = "https://mirrors.aliyun.com/pypi/simple/"
default = true

[dependency-groups]
dev = ["pytest>=8.4.1", "pytest-asyncio>=1.1.0"]
packaging = ["pyinstaller>=6.11.0,<7"]
